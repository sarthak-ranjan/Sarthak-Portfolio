<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 | Lost in Cyberspace</title>

    <!-- Favicon -->
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- Styles -->
    <link rel="stylesheet" href="style.css?v=213" />
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
        background: var(--bg-main);
        margin: 0;
      }
      .error-container {
        text-align: center;
        z-index: 10;
      }
      .error-code {
        font-size: 15vw;
        font-weight: 800;
        line-height: 1;
        font-family: "Space Grotesk", sans-serif;
        background: linear-gradient(
          135deg,
          var(--accent-primary),
          var(--accent-secondary)
        );
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 0;
        text-shadow: 0 0 50px rgba(139, 92, 246, 0.3);
        animation: glitch 3s infinite alternate;
      }
      .error-msg {
        font-size: 1.1rem;
        color: var(--text-secondary);
        font-family: "Space Grotesk", monospace;
        text-align: left;
        margin: 0;
        line-height: 1.6;
      }
      .terminal-box {
        background: rgba(17, 17, 22, 0.8);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 1.5rem;
        max-width: 500px;
        margin: 0 auto 2rem auto;
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        position: relative;
      }
      .terminal-header {
        display: flex;
        gap: 8px;
        margin-bottom: 15px;
        padding-bottom: 15px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }
      .dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
      }
      .cursor {
        animation: blink 1s step-end infinite;
        color: var(--accent-primary);
      }
      @keyframes blink {
        50% {
          opacity: 0;
        }
      }
      .home-btn {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 12px 28px;
        border-radius: var(--radius-pill);
        background: var(--glass-bg);
        border: var(--glass-border);
        color: var(--text-main);
        text-decoration: none;
        font-weight: 600;
        transition: all 0.3s ease;
        backdrop-filter: var(--glass-blur);
      }
      .home-btn:hover {
        background: rgba(255, 255, 255, 0.05);
        border-color: var(--accent-primary);
        box-shadow: 0 0 20px rgba(139, 92, 246, 0.2);
        transform: translateY(-2px);
      }
      @keyframes glitch {
        0% {
          transform: translate(0);
        }
        20% {
          transform: translate(-2px, 2px);
        }
        40% {
          transform: translate(-2px, -2px);
        }
        60% {
          transform: translate(2px, 2px);
        }
        80% {
          transform: translate(2px, -2px);
        }
        100% {
          transform: translate(0);
        }
      }
    </style>
  </head>

  <body class="theme-dark">
    <!-- Background Effects -->
    <div class="aurora-bg">
      <div class="aurora aurora-1"></div>
      <div class="aurora aurora-2"></div>
      <div class="aurora aurora-3"></div>
    </div>
    <div
      id="particles-js"
      style="
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        z-index: 0;
      "
    ></div>
    <div class="grid-overlay"></div>

    <div class="error-container">
      <h1 class="error-code">404</h1>
      <div class="terminal-box">
        <div class="terminal-header">
          <span class="dot" style="background: #ff5f56"></span>
          <span class="dot" style="background: #ffbd2e"></span>
          <span class="dot" style="background: #27c93f"></span>
        </div>
        <p class="error-msg" id="typing-text"></p>
      </div>
      <a href="index.html" class="home-btn magnetic" style="margin-top: 2rem">
        <i class="fa-solid fa-house"></i>
        <span>Return to Base</span>
      </a>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script>
      // Terminal Typing Effect
      const text =
        "> ERROR: System Not Found.\n> Attempting to re-route connection...\n> Connection lost. You are drifting in cyberspace.";
      const typingEl = document.getElementById("typing-text");
      let i = 0;

      function typeWriter() {
        if (i < text.length) {
          if (text.charAt(i) === "\n") {
            typingEl.innerHTML += "<br>";
          } else {
            typingEl.innerHTML += text.charAt(i);
          }
          i++;
          setTimeout(typeWriter, Math.random() * 50 + 30);
        } else {
          typingEl.innerHTML += '<span class="cursor">_</span>';
        }
      }
      setTimeout(typeWriter, 500);
      // Init Particles
      if (typeof particlesJS !== "undefined") {
        particlesJS("particles-js", {
          particles: {
            number: { value: 40 },
            color: { value: "#8b5cf6" },
            shape: { type: "circle" },
            opacity: { value: 0.5 },
            size: { value: 3 },
            line_linked: {
              enable: true,
              distance: 150,
              color: "#06b6d4",
              opacity: 0.3,
            },
            move: { enable: true, speed: 1 },
          },
          interactivity: {
            events: {
              onhover: { enable: true, mode: "grab" },
            },
            modes: { grab: { distance: 200 } },
          },
        });
      }

      // Simple Magnetic Button Effect for 404 page
      const magnet = document.querySelector(".magnetic");
      magnet.addEventListener("mousemove", (e) => {
        const rect = magnet.getBoundingClientRect();
        const x = e.clientX - rect.left - rect.width / 2;
        const y = e.clientY - rect.top - rect.height / 2;
        magnet.style.transform = `translate(${x * 0.3}px, ${y * 0.3}px)`;
      });
      magnet.addEventListener("mouseleave", () => {
        magnet.style.transform = `translate(0px, 0px)`;
      });
    </script>
  </body>
</html>
