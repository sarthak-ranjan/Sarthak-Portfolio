<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#8b5cf6" />
            <stop offset="100%" stop-color="#06b6d4" />
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>
    <rect width="100" height="100" rx="22" fill="#111116" stroke="#2a2a35" stroke-width="2"/>
    <text x="50" y="68" font-family="Arial, Helvetica, sans-serif" font-size="50" font-weight="900" fill="url(#grad)" filter="url(#glow)" text-anchor="middle" letter-spacing="-2">SR</text>
</svg>
